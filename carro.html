<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IronForge - Sistema de Treinamento Elite</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #adff2f;
            --bg-dark: #0a0a0a;
            --glass-bg: rgba(255, 255, 255, 0.07);
            --text-light: #ffffff;
            --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg-dark); min-height: 100vh; color: var(--text-light); overflow-x: hidden; }

        .background-overlay {
            position: fixed; width: 100%; height: 100%;
            background: radial-gradient(circle at 10% 20%, rgba(173, 255, 47, 0.08) 0%, transparent 40%),
                        radial-gradient(circle at 90% 80%, rgba(100, 50, 255, 0.1) 0%, transparent 40%);
            z-index: -1;
        }

        /* --- LOGIN --- */
        #login-screen { display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .login-box { background: var(--glass-bg); backdrop-filter: blur(25px); padding: 40px; border-radius: 28px; border: 1px solid rgba(255, 255, 255, 0.1); text-align: center; width: 100%; max-width: 500px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        
        header h1 { font-weight: 800; font-size: 2.5rem; letter-spacing: -1px; margin-bottom: 5px; }
        header h1 span { color: var(--primary); text-shadow: 0 0 20px rgba(173, 255, 47, 0.4); }
        header p { opacity: 0.5; font-size: 0.8rem; margin-bottom: 30px; letter-spacing: 2px; }

        .input-group { position: relative; margin-bottom: 22px; text-align: left; }
        .input-group input, .input-group select {
            width: 100%; padding: 14px 10px; background: rgba(255,255,255,0.03); border: none;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1); color: white; outline: none; border-radius: 8px 8px 0 0;
            transition: var(--transition);
        }
        .input-group label { position: absolute; left: 10px; top: 14px; transition: 0.3s; opacity: 0.4; pointer-events: none; }
        .input-group input:focus ~ label, .input-group input:valid ~ label, .input-group select:focus ~ label { top: -18px; font-size: 0.7rem; color: var(--primary); opacity: 1; }

        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        select option { background: #111; color: white; }

        /* --- DASHBOARD --- */
        #dashboard { display: none; width: 100%; max-width: 1200px; margin: 0 auto; padding: 40px 20px; animation: slideUp 0.6s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .nav-tabs { display: flex; gap: 12px; margin-bottom: 30px; overflow-x: auto; padding-bottom: 10px; justify-content: center; }
        .tab-btn { background: var(--glass-bg); border: 1px solid rgba(255,255,255,0.05); color: white; padding: 12px 28px; cursor: pointer; border-radius: 14px; transition: var(--transition); white-space: nowrap; font-weight: 600; }
        .tab-btn.active { background: var(--primary); color: black; border-color: var(--primary); box-shadow: 0 5px 15px rgba(173, 255, 47, 0.3); }

        .content-section { background: var(--glass-bg); backdrop-filter: blur(20px); padding: 35px; border-radius: 28px; border: 1px solid rgba(255, 255, 255, 0.1); margin-bottom: 20px; }
        
        /* Treino Layout */
        .workout-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 30px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; }
        .weekly-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 25px; }
        .day-card { background: rgba(255,255,255,0.02); border-radius: 22px; padding: 25px; border: 1px solid rgba(255,255,255,0.05); position: relative; overflow: hidden; }
        .day-card::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--primary); }
        .day-name { color: var(--primary); font-weight: 800; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; }
        .muscle-title { font-size: 1.3rem; margin: 5px 0 20px 0; }
        
        .exercise-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .exercise-info b { font-size: 0.95rem; display: block; color: #fff; }
        .exercise-info span { font-size: 0.75rem; opacity: 0.5; display: block; }
        .badge { background: rgba(173, 255, 47, 0.1); color: var(--primary); padding: 4px 10px; border-radius: 8px; font-size: 0.75rem; font-weight: 700; border: 1px solid rgba(173, 255, 47, 0.2); }

        /* Evolução */
        .chart-container { background: rgba(0,0,0,0.3); padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); width: 100%; }
        .evolution-metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; margin-top: 20px; }
        .metric-box { background: var(--glass-bg); padding: 15px; border-radius: 15px; text-align: center; }
        .metric-box h4 { font-size: 0.8rem; opacity: 0.6; margin-bottom: 5px; }
        .metric-box p { font-size: 1.4rem; font-weight: 800; color: var(--primary); }

        .btn-primary { width: 100%; padding: 18px; background: var(--primary); border: none; border-radius: 14px; font-weight: 800; cursor: pointer; transition: var(--transition); text-transform: uppercase; letter-spacing: 1px; }
        .btn-primary:hover { filter: brightness(1.1); transform: translateY(-2px); box-shadow: 0 10px 20px rgba(173, 255, 47, 0.2); }

        .hidden { display: none !important; }
        h2 span { color: var(--primary); }

        .cardio-note { margin-top: 15px; padding: 10px; background: rgba(173, 255, 47, 0.05); border-radius: 10px; font-size: 0.8rem; color: var(--primary); border-left: 2px solid var(--primary); }
    </style>
</head>
<body>

    <div class="background-overlay"></div>

    <main id="login-screen">
        <section class="login-box">
            <header>
                <h1>IRON<span>FORGE</span></h1>
                <p>MOLDE SUA MELHOR VERSÃO</p>
            </header>  
            
            <form id="fitnessForm">
                <div class="input-group"><input type="text" id="name" required><label>Nome do Usuário</label></div>
                
                <div class="stats-grid">
                    <div class="input-group"><input type="number" id="weight" step="0.1" required><label>Peso (kg)</label></div>
                    <div class="input-group"><input type="number" id="height" step="0.01" required><label>Altura (m)</label></div>
                    <div class="input-group"><input type="number" id="age" required><label>Idade</label></div>
                </div>

                <div class="input-group">
                    <select id="frequency" required>
                        <option value="3">3 Vezes na semana</option>
                        <option value="4">4 Vezes na semana</option>
                        <option value="5">5 Vezes na semana</option>
                        <option value="6" selected>6 Vezes na semana</option>
                    </select>
                    <label style="top:-18px; opacity:1; color:var(--primary)">Frequência de Treino</label>
                </div>

                <div class="input-group">
                    <select id="goal" required>
                        <option value="hipertrofia">Hipertrofia Muscular (Volume)</option>
                        <option value="cutting">Definição Extrema (Cutting)</option>
                        <option value="jogador">Atleta: Explosão & Agilidade</option>
                        <option value="powerlifting">Força Bruta (Powerlifting)</option>
                        <option value="calistenia">Calistenia & Controle</option>
                        <option value="crossfit">Condicionamento Cross</option>
                        <option value="funcional">Funcional & Postural</option>
                        <option value="lutas">Lutas & MMA</option>
                    </select>
                    <label style="top:-18px; opacity:1; color:var(--primary)">Objetivo do Protocolo</label>
                </div>

                <button type="submit" class="btn-primary">GERAR ACESSO AO PAINEL</button>
            </form>
        </section>
    </main>

    <main id="dashboard">
        <nav class="nav-tabs">
            <button class="tab-btn active" data-tab="treino">TREINAMENTO</button>
            <button class="tab-btn" data-tab="evolucao">EVOLUÇÃO</button>
            <button class="tab-btn" data-tab="perfil">PERFIL</button>
        </nav>

        <section id="treino" class="content-section">
            <div class="workout-header">
                <div>
                    <h2 id="display-goal">Plano de <span>Treinamento</span></h2>
                    <p id="display-subtitle" style="opacity: 0.6; font-size: 0.9rem;"></p>
                </div>
                <div id="display-freq" class="badge" style="font-size: 1rem; padding: 10px 20px;"></div>
            </div>
            <div class="weekly-grid" id="workout-list"></div>
        </section>

        <section id="evolucao" class="content-section hidden">
            <h2 style="margin-bottom: 20px;">Análise de <span>Performance</span></h2>
            <div class="chart-container">
                <svg viewBox="0 0 500 150" style="width: 100%; height: 100%;">
                    <defs>
                        <linearGradient id="grad" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" style="stop-color:var(--primary);stop-opacity:0.3" />
                            <stop offset="100%" style="stop-color:var(--primary);stop-opacity:0" />
                        </linearGradient>
                    </defs>
                    <path d="M0,120 L50,110 L100,115 L150,90 L200,95 L250,70 L300,75 L350,50 L400,55 L450,30 L500,35 L500,150 L0,150 Z" fill="url(#grad)" />
                    <path d="M0,120 L50,110 L100,115 L150,90 L200,95 L250,70 L300,75 L350,50 L400,55 L450,30 L500,35" fill="none" stroke="var(--primary)" stroke-width="3" stroke-linecap="round" />
                </svg>
            </div>
            <div class="evolution-metrics">
                <div class="metric-box"><h4>Peso Inicial</h4><p id="start-weight">--</p></div>
                <div class="metric-box"><h4>Peso Atual</h4><p id="curr-weight">--</p></div>
                <div class="metric-box"><h4>IMC</h4><p id="imc-val">--</p></div>
                <div class="metric-box"><h4>Progressão</h4><p id="prog-val">+4.2%</p></div>
            </div>
        </section>

        <section id="perfil" class="content-section hidden">
            <h2>Configurações do <span>Atleta</span></h2>
            <div id="profile-details" style="margin-top: 30px; font-size: 1.1rem; line-height: 2.5;"></div>
            <button onclick="location.reload()" class="btn-primary" style="margin-top: 40px; background: #ff4444; color: white;">SAIR DO SISTEMA</button>
        </section>
    </main>

    <script>
        // Lógica de Troca de Abas Corrigida
        document.querySelectorAll('.tab-btn').forEach(button => {
            button.addEventListener('click', () => {
                const targetTab = button.getAttribute('data-tab');

                // Remove active de todos os botões
                document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
                // Adiciona active no clicado
                button.classList.add('active');

                // Esconde todas as seções
                document.querySelectorAll('.content-section').forEach(section => section.classList.add('hidden'));
                // Mostra a seção alvo
                document.getElementById(targetTab).classList.remove('hidden');
            });
        });

        const treinosMaster = {
            hipertrofia: [
                { d: "Segunda", t: "Push (Peito/Ombros)", ex: ["Supino Reto Barra 4x10", "Supino Inclinado Halteres 3x12", "Crossover Polia 3x15", "Desenv. Militar 4x10", "Elevação Lateral 4x15"], c: "15 min caminhada inclinada" },
                { d: "Terça", t: "Pull (Costas/Biceps)", ex: ["Puxada Alta 4x10", "Remada Curvada 4x10", "Remada Cavalinho 3x12", "Rosca Direta 3x10", "Rosca Martelo 3x12"], c: "Cardio opcional" },
                { d: "Quarta", t: "Legs (Quadríceps)", ex: ["Agachamento Livre 4x8", "Leg Press 4x12", "Extensora 4x15", "Passada 3x10", "Panturrilha 5x20"], c: "10 min bike" },
                { d: "Quinta", t: "Ombros & Triceps", ex: ["Desenv. Halteres 4x10", "Elevação Frontal 3x12", "Triceps Testa 3x10", "Triceps Corda 3x15", "Mergulho 3x Max"], c: "20 min cardio leve" },
                { d: "Sexta", t: "Posterior & Gluteos", ex: ["Terra 3x8", "Mesa Flexora 4x12", "Stiff 3x12", "Elevação Pélvica 4x10", "Cadeira Abdutora 3x15"], c: "Sem cardio" },
                { d: "Sábado", t: "Full Body Pump", ex: ["Barra Fixa 3x Max", "Flexão 3x20", "Goblet Squat 3x15", "Remada Alta 3x12", "Abdominais 4x20"], c: "30 min caminhada" }
            ],
            cutting: [
                { d: "Dia 1", t: "HIIT & Peito", ex: ["Burpees 4x15", "Supino Reto 4x15", "Crucifixo 3x20", "Flexão 3x Max"], c: "HIIT 15 min" },
                { d: "Dia 2", t: "Cardio & Costas", ex: ["Puxada Alta 4x15", "Remada Baixa 4x15", "Serrote 3x12", "Pulldown 3x20"], c: "Corrida 20 min" },
                { d: "Dia 3", t: "Membros Inferiores", ex: ["Agachamento 4x20", "Leg Press 4x20", "Mesa Flexora 4x20", "Panturrilha 4x25"], c: "Escada 15 min" }
                // Adicionado mais conforme necessidade...
            ],
            jogador: [
                { d: "Dia 1", t: "Explosão/Sprints", ex: ["Sprints 10x30m", "Box Jumps 5x5", "Agacho Salto 4x10"], c: "Agilidade 15 min" },
                { d: "Dia 2", t: "Força Funcional", ex: ["Clean & Press 5x3", "Passada Explosiva 3x8", "Barra Fixa 4x8"], c: "Bike 20 min" }
            ],
            powerlifting: [
                { d: "Dia 1", t: "Squat Day", ex: ["Agachamento 5x5", "Pausa Squat 3x8", "Leg Press 3x10"], c: "Mobilidade" },
                { d: "Dia 2", t: "Bench Day", ex: ["Supino 5x5", "Spoto Press 3x8", "Militar 3x8"], c: "Mobilidade" }
            ],
            calistenia: [
                { d: "Dia 1", t: "Push Skills", ex: ["Dips 4x12", "Flexão Diamante 4x15", "Pike Pushups 3x10"], c: "Handstand 10 min" }
            ],
            crossfit: [
                { d: "Dia 1", t: "WOD Strength", ex: ["Front Squat 5x5", "WOD: Cindy (20 min)", "Wall Ball 50 reps"], c: "Remo 1000m" }
            ],
            funcional: [
                { d: "Dia 1", t: "Core & Balance", ex: ["Bird Dog 3x15", "Prancha 3x1min", "Step Up 3x15"], c: "Caminhada 20 min" }
            ],
            lutas: [
                { d: "Dia 1", t: "Power & Strike", ex: ["Medicine Ball Slam 4x20", "Sprawls 4x15", "Supino Explosivo 4x8"], c: "Saco de Pancada 15m" }
            ]
        };

        // Submissão do Formulário
        document.getElementById('fitnessForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const goal = document.getElementById('goal').value;
            const freq = parseInt(document.getElementById('frequency').value);
            const name = document.getElementById('name').value;
            const weight = parseFloat(document.getElementById('weight').value);
            const height = parseFloat(document.getElementById('height').value);

            // Troca de Telas
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('dashboard').style.display = 'block';

            // Preenche Dados de Evolução
            document.getElementById('start-weight').innerText = weight + " kg";
            document.getElementById('curr-weight').innerText = weight + " kg";
            const imc = (weight / (height * height)).toFixed(1);
            document.getElementById('imc-val').innerText = imc;

            // Cabeçalho
            document.getElementById('display-goal').innerHTML = `Plano <span>${document.getElementById('goal').selectedOptions[0].text.split('(')[0]}</span>`;
            document.getElementById('display-freq').innerText = `${freq}x Semana`;
            document.getElementById('display-subtitle').innerText = `Atleta: ${name} | Protocolo IronForge`;

            // Renderiza Treinos
            const list = document.getElementById('workout-list');
            list.innerHTML = "";
            const workoutBase = treinosMaster[goal] || treinosMaster['hipertrofia'];
            const dailySelection = workoutBase.slice(0, freq);

            dailySelection.forEach(item => {
                const card = document.createElement('div');
                card.className = "day-card";
                card.innerHTML = `
                    <span class="day-name">${item.d}</span>
                    <h3 class="muscle-title">${item.t}</h3>
                    <div class="ex-container">
                        ${item.ex.map(ex => {
                            const splitEx = ex.split(' ');
                            const reps = splitEx.pop();
                            return `<div class="exercise-item">
                                <div class="exercise-info"><b>${splitEx.join(' ')}</b><span>Foco na técnica</span></div>
                                <span class="badge">${reps}</span>
                            </div>`;
                        }).join('')}
                    </div>
                    <div class="cardio-note">🏃 Cardio: ${item.c}</div>
                `;
                list.appendChild(card);
            });

            // Perfil
            document.getElementById('profile-details').innerHTML = `
                <p><b>Atleta:</b> ${name}</p>
                <p><b>Objetivo:</b> ${document.getElementById('goal').selectedOptions[0].text}</p>
                <p><b>Altura:</b> ${height}m | <b>Idade:</b> ${document.getElementById('age').value} anos</p>
                <p><b>Status:</b> Ativo</p>
            `;
        });
    </script>
</body>
</html>
