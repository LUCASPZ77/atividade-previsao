<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IronForge PRO | Master Engine v5.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;900&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #adff2f;
            --bg: #050505;
            --surface: #121212;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: white; overflow-x: hidden; min-height: 100vh; }

        /* --- LOGIN --- */
        #login-screen {
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            background: radial-gradient(circle at top right, #1a2e0a, #050505);
            padding: 20px;
        }
        .login-card {
            background: var(--surface); padding: 40px; border-radius: 30px; border: 1px solid var(--border);
            width: 100%; max-width: 450px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* --- DASHBOARD --- */
        #dashboard { display: none; }
        .top-nav {
            padding: 20px; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; background: rgba(5,5,5,0.9); backdrop-filter: blur(15px); z-index: 100;
        }

        .tab-content { display: none; padding: 20px; max-width: 1200px; margin: 0 auto; animation: slideUp 0.4s ease; }
        .tab-content.active { display: block; }

        /* --- CARDS DE TREINO --- */
        .workout-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px; margin-top: 20px; }
        .day-card {
            background: var(--surface); border-radius: 24px; padding: 25px; border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .day-card h3 { color: var(--primary); font-family: 'Orbitron'; font-size: 1.1rem; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        
        .exercise-item {
            padding: 15px; margin-bottom: 10px; border-radius: 12px; background: rgba(255,255,255,0.02);
            border: 1px solid transparent; transition: var(--transition); cursor: pointer;
        }
        .exercise-item:hover { border-color: var(--primary); background: rgba(173, 255, 47, 0.05); }

        /* --- ENCICLOPÉDIA --- */
        .search-container { position: sticky; top: 80px; z-index: 90; padding: 10px 0; background: var(--bg); }
        .search-bar { width: 100%; padding: 18px; border-radius: 15px; border: 1px solid var(--border); background: var(--surface); color: white; font-size: 1rem; }
        
        .lib-card {
            background: var(--surface); padding: 25px; border-radius: 20px; border: 1px solid var(--border);
            margin-bottom: 15px; transition: var(--transition);
        }
        .lib-card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .muscle-tag { font-size: 0.65rem; background: var(--primary); color: black; padding: 3px 8px; border-radius: 4px; font-weight: 900; text-transform: uppercase; }

        /* --- MENU INFERIOR --- */
        .bottom-bar {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            background: rgba(15,15,15,0.95); backdrop-filter: blur(20px);
            padding: 15px 45px; border-radius: 50px; display: flex; gap: 50px;
            border: 1px solid var(--border); box-shadow: 0 10px 40px rgba(0,0,0,0.8); z-index: 1000;
        }
        .nav-btn { color: #555; font-size: 1.5rem; cursor: pointer; transition: 0.3s; position: relative; }
        .nav-btn.active { color: var(--primary); }
        .nav-btn.active::after { content: ''; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%); width: 5px; height: 5px; background: var(--primary); border-radius: 50%; }

        /* --- FORM ELEMENTS --- */
        select, input { width: 100%; padding: 15px; margin-top: 15px; border-radius: 12px; border: 1px solid var(--border); background: #000; color: white; }
        .btn-primary { width: 100%; padding: 20px; margin-top: 25px; border-radius: 15px; border: none; background: var(--primary); color: black; font-weight: 900; font-family: 'Orbitron'; cursor: pointer; transition: 0.3s; }
        .btn-primary:hover { filter: brightness(1.2); box-shadow: 0 0 20px rgba(173, 255, 47, 0.3); }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <main id="login-screen">
        <div class="login-card">
            <h1 style="font-family: 'Orbitron'; color: var(--primary); font-size: 2.2rem;">IRON<span style="color:white">FORGE</span></h1>
            <p style="color: #666; letter-spacing: 2px; font-size: 0.8rem; margin-bottom: 30px;">ELITE PERFORMANCE SYSTEMS</p>
            
            <form id="main-setup">
                <input type="text" id="name" placeholder="Nome do Operador" required>
                
                <select id="goal">
                    <option value="hipertrofia">Foco: Hipertrofia Estética</option>
                    <option value="forca">Foco: Força Bruta (Powerlifting)</option>
                    <option value="atleta">Foco: Performance Atleta</option>
                </select>

                <select id="freq">
                    <option value="3">Frequência: 3 Dias (Full Body)</option>
                    <option value="4">Frequência: 4 Dias (Split AB)</option>
                    <option value="5">Frequência: 5 Dias (Split ABCDE)</option>
                    <option value="6" selected>Frequência: 6 Dias (Split PPL 2x)</option>
                </select>

                <button type="submit" class="btn-primary">INICIAR PROTOCOLO</button>
            </form>
        </div>
    </main>

    <div id="dashboard">
        <nav class="top-nav">
            <div id="user-info">
                <small style="color: var(--primary); font-weight: 800; display: block;">ATIVO</small>
                <span id="display-name" style="font-family: 'Orbitron'; font-size: 0.9rem;">USUÁRIO</span>
            </div>
            <div id="display-goal" style="font-size: 0.7rem; border: 1px solid var(--primary); padding: 5px 12px; border-radius: 20px; color: var(--primary);">GOAL</div>
        </nav>

        <section id="tab-workout" class="tab-content active">
            <div class="workout-grid" id="render-workout"></div>
        </section>

        <section id="tab-wiki" class="tab-content">
            <div class="search-container">
                <input type="text" class="search-bar" id="wiki-search" placeholder="🔍 Buscar técnica ou músculo..." onkeyup="searchWiki()">
            </div>
            <div id="render-wiki"></div>
        </section>

        <nav class="bottom-bar">
            <div class="nav-btn active" onclick="changeTab('tab-workout', this)"><i class="fas fa-bolt"></i></div>
            <div class="nav-btn" onclick="changeTab('tab-wiki', this)"><i class="fas fa-book-skull"></i></div>
            <div class="nav-btn" onclick="location.reload()"><i class="fas fa-power-off"></i></div>
        </nav>
    </div>

    <script>
        // BASE DE DADOS COMPLETA (SIMULANDO 100 EXERCÍCIOS)
        const EXERCISES_DATABASE = [
            { id: 1, cat: "Peito", name: "Supino Reto Barra", target: "Peitoral Maior", desc: "Deitado, desça a barra até o peito e empurre verticalmente.", tip: "Mantenha as escápulas retraídas durante todo o movimento." },
            { id: 2, cat: "Peito", name: "Supino Inclinado Halteres", target: "Peitoral Superior", desc: "Banco a 45°. Desça os halteres até a linha do ombro.", tip: "Não bata os halteres no topo para manter a tensão." },
            { id: 3, cat: "Costas", name: "Puxada Alta (Pulley)", target: "Dorsais", desc: "Puxe a barra em direção ao peito superior, abrindo os cotovelos.", tip: "Imagine puxar com os cotovelos, não com as mãos." },
            { id: 4, cat: "Costas", name: "Remada Curvada", target: "Rombóides/Dorsais", desc: "Incline o tronco 45°, puxe a barra na direção do umbigo.", tip: "Mantenha a coluna neutra para evitar lesões." },
            { id: 5, cat: "Pernas", name: "Agachamento Livre", target: "Quadríceps/Glúteo", desc: "Desça o quadril abaixo da linha do joelho e suba.", tip: "Mantenha o calcanhar firme no chão." },
            { id: 6, cat: "Pernas", name: "Leg Press 45", target: "Quadríceps", desc: "Empurre a plataforma sem estender totalmente os joelhos.", tip: "Pés na largura dos ombros no meio da plataforma." },
            { id: 7, cat: "Ombros", name: "Desenvolvimento Militar", target: "Deltóide Anterior", desc: "Empurre a barra ou halteres acima da cabeça.", tip: "Contraia o abdômen para proteger a lombar." },
            { id: 8, cat: "Ombros", name: "Elevação Lateral", target: "Deltóide Lateral", desc: "Suba os braços lateralmente até a altura dos ombros.", tip: "Mantenha o dedinho levemente mais alto que o polegar." },
            { id: 9, cat: "Bíceps", name: "Rosca Direta W", target: "Bíceps Braquial", desc: "Flexão de cotovelos com a barra W.", tip: "Evite balançar o corpo para subir o peso." },
            { id: 10, cat: "Tríceps", name: "Tríceps Corda", target: "Tríceps Lateral", desc: "Estenda os braços para baixo abrindo a corda no final.", tip: "Mantenha os cotovelos colados ao corpo." },
            { id: 11, cat: "Pernas", name: "Stiff Barra", target: "Posteriores", desc: "Desça a barra rente à perna com joelhos semi-flexionados.", tip: "Sinta o alongamento na parte de trás da coxa." },
            { id: 12, cat: "Pernas", name: "Cadeira Extensora", target: "Quadríceps", desc: "Extensão total das pernas na máquina.", tip: "Segure 1 segundo no topo (pico de contração)." }
        ];

        // Gerador de exercícios extras para volume (Simulação)
        for(let i=13; i<=60; i++) {
            EXERCISES_DATABASE.push({
                id: i,
                cat: i%2==0 ? "Funcional" : "Core",
                name: `Técnica Avançada #${i}`,
                target: "Múltiplos Grupos",
                desc: "Movimento complexo para estabilização e força.",
                tip: "Foco total na respiração e cadência 2-0-2."
            });
        }

        // --- ENGINE ---
        document.getElementById('main-setup').onsubmit = function(e) {
            e.preventDefault();
            
            const user = {
                name: document.getElementById('name').value,
                goal: document.getElementById('goal').value,
                freq: parseInt(document.getElementById('freq').value)
            };

            startApp(user);
        };

        function startApp(user) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            document.getElementById('display-name').innerText = user.name.toUpperCase();
            document.getElementById('display-goal').innerText = user.goal.toUpperCase();
            
            renderWorkout(user);
            renderWiki();
        }

        function renderWorkout(user) {
            const container = document.getElementById('render-workout');
            container.innerHTML = "";
            let workoutPlan = [];

            // Lógica de Montagem de Treino Baseada em Frequência
            if(user.freq == 3) {
                workoutPlan = [
                    { title: "Full Body A", ids: [1, 3, 5, 7, 9, 10] },
                    { title: "Full Body B", ids: [2, 4, 6, 8, 11, 12] },
                    { title: "Full Body C", ids: [1, 4, 5, 8, 9, 10] }
                ];
            } else if(user.freq == 4) {
                workoutPlan = [
                    { title: "Upper (Superior) A", ids: [1, 2, 3, 4, 7, 9] },
                    { title: "Lower (Inferior) A", ids: [5, 6, 11, 12, 13, 14] },
                    { title: "Upper (Superior) B", ids: [1, 3, 7, 8, 9, 10] },
                    { title: "Lower (Inferior) B", ids: [5, 6, 11, 12, 15, 16] }
                ];
            } else {
                // PPL (Push, Pull, Legs)
                workoutPlan = [
                    { title: "Push (Empurrar)", ids: [1, 2, 7, 8, 10] },
                    { title: "Pull (Puxar)", ids: [3, 4, 9, 15, 17] },
                    { title: "Legs (Pernas)", ids: [5, 6, 11, 12, 18] },
                    { title: "Push B", ids: [2, 7, 8, 10, 20] },
                    { title: "Pull B", ids: [4, 9, 15, 21, 22] },
                    { title: "Legs B", ids: [6, 11, 12, 23, 24] }
                ];
            }

            // Slice para respeitar a frequência exata escolhida
            workoutPlan.slice(0, user.freq).forEach(day => {
                const card = document.createElement('div');
                card.className = "day-card";
                
                let exercisesHtml = day.ids.map(id => {
                    const ex = EXERCISES_DATABASE.find(e => e.id === id) || EXERCISES_DATABASE[0];
                    return `
                        <div class="exercise-item" onclick="viewDetails('${ex.name}')">
                            <div style="display:flex; justify-content:space-between; align-items:center;">
                                <strong style="font-size:0.9rem;">${ex.name}</strong>
                                <span style="color:var(--primary); font-family:'Orbitron'; font-size:0.75rem;">
                                    ${user.goal == 'forca' ? '5x5' : '4x12'}
                                </span>
                            </div>
                            <small style="color:#555; text-transform:uppercase; font-size:0.6rem;">${ex.target}</small>
                        </div>
                    `;
                }).join('');

                card.innerHTML = `<h3><i class="fas fa-calendar-day"></i> ${day.title}</h3>${exercisesHtml}`;
                container.appendChild(card);
            });
        }

        function renderWiki() {
            const container = document.getElementById('render-wiki');
            container.innerHTML = EXERCISES_DATABASE.map(ex => `
                <div class="lib-card" data-search="${ex.name.toLowerCase()} ${ex.cat.toLowerCase()}">
                    <span class="muscle-tag">${ex.cat}</span>
                    <h2 style="margin: 10px 0; font-family:'Orbitron'; font-size:1.1rem;">${ex.name}</h2>
                    <p style="color:#888; font-size:0.85rem; margin-bottom:10px;"><strong>Alvo:</strong> ${ex.target}</p>
                    <p style="font-size:0.9rem; line-height:1.4; margin-bottom:10px;">${ex.desc}</p>
                    <div style="background:rgba(173,255,47,0.1); padding:10px; border-left:3px solid var(--primary); font-size:0.8rem; color:var(--primary)">
                        <strong>DICA PRO:</strong> ${ex.tip}
                    </div>
                </div>
            `).join('');
        }

        function searchWiki() {
            const query = document.getElementById('wiki-search').value.toLowerCase();
            document.querySelectorAll('.lib-card').forEach(card => {
                const content = card.getAttribute('data-search');
                card.style.display = content.includes(query) ? 'block' : 'none';
            });
        }

        function viewDetails(name) {
            changeTab('tab-wiki', document.querySelectorAll('.nav-btn')[1]);
            document.getElementById('wiki-search').value = name;
            searchWiki();
        }

        function changeTab(tabId, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            btn.classList.add('active');
            window.scrollTo(0,0);
        }
    </script>
</body>
</html>
